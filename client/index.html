<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#2e7d32">
<link rel="stylesheet" href="style/dashboard.css">
<link rel="icon" href="./assets/favico.ico">
<link rel="icon" type="image/png" href="./assets/app-icon.png">
</head>

<body>

<header class="nav">
    <h2>MedTrack</h2>

    <div class="nav-buttons">
        <button onclick="goDashboardy()">Dashboard</button>
        <button onclick="goHistory()">History</button>
        <button onclick="goProfile()">Profile</button>
        <button onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">

<h1>MedTrack Dashboard</h1>

<p id="welcome"></p>

<button class="add-btn" onclick="goAddMedicine()">Add Medicine</button>

<h2>Today's Medicine Intake Schedule</h2>

<table>
<tr>
<th>Done</th>
<th>Medicine</th>
<th>Dosage</th>
<th>Qty</th>
<th>Time</th>
<th>Actions</th>
</tr>

<tbody id="medicineTable"></tbody>

</table>

<p id="msg"></p>

</div>

<script src="dashboard.js"></script>


<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/service-worker.js")
      .then(() => console.log("Service Worker registered"))
      .catch(error => console.log("Service Worker error:", error));
  }
</script>
</body>
</html>
