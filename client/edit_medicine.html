<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Medicine</title>
    <link rel="stylesheet" href="style/add_medicine.css">
</head>
<body>

    <main class="form-container">
        <h2>Edit Medicine</h2>

        <form id="editMedicineForm">
            <label for="medicine_name">Medicine Name</label>
            <input id="medicine_name" type="text" required>

            <label for="quantity_taken">Quantity</label>
            <input id="quantity_taken" type="number" oninput="checkDosage()" required>

            <label for="dosage_per_tablet">Dosage per tablet</label>
            <input id="dosage_per_tablet" type="number" oninput="checkDosage()" required>

            <label for="total_dosage">Total Dosage</label>
            <input id="total_dosage" type="number" readonly>

            <label for="medicine_date">Date</label>
            <input id="medicine_date" type="date" required>

            <label for="medicine_time">Time</label>
            <input id="medicine_time" type="time" required>

            <div class="form-buttons">
                <button type="button" onclick="updateMedicine()">Update</button>
                <button type="button" onclick="goBack()">Back</button>
            </div>
        </form>

        <p id="msg"></p>
    </main>

    <script src="edit_medicine.js"></script>
</body>
</html>
