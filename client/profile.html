<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile</title>
    <link rel="stylesheet" href="style/profile.css">
    <link rel="icon" href="assets/favicon.ico?v=2" type="image/x-icon">
    <link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2d6cdf">

</head>

<body>

<header>
    <h1>MedTrack</h1>

    <div class="nav-buttons">
        <button onclick="goDashboard()">Dashboard</button>
        <button onclick="goHistory()">History</button>
        <button onclick="goProfile()">Profile</button>
        <button onclick="logout()">Logout</button>
    </div>
</header>

<main class="profile-container">

    <h2>Profile</h2>

    <div class="profile-picture">
        <img src="assets/profile.png" alt="Profile Picture">
    </div>

    <div class="profile-info">
        <p><b>First Name:</b> <span id="first_name"></span></p>
        <p><b>Last Name:</b> <span id="last_name"></span></p>
        <p><b>Date of Birth:</b> <span id="date_of_birth"></span></p>
        <p><b>Address:</b> <span id="address"></span></p>
        <p><b>Email:</b> <span id="email"></span></p>
        <p><b>Contact Number:</b> <span id="contact_number"></span></p>
    </div>

    <button class="back-btn" onclick="goBack()">Back</button>

</main>

<script src="profile.js"></script>

</body>
</html>
