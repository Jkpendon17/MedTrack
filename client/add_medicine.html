<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style/add_medicine.css">
    <title>Document</title>
</head>
<body>
<header class="nav">
    <h2>MedTrack</h2>

    <div class="nav-buttons">
        <button onclick="goDashboard()">Dashboard</button>
        <button onclick="goHistory()">History</button>
        <button onclick="goProfile()">Profile</button>
        <button onclick="logout()">Logout</button>
    </div>
</header>
<h2>Add Medicine Intake</h2>

<label>Medicine Name</label><br>
<input id="medicine_name"><br><br>

<label>Quantity</label><br>
<input id="quantity_taken" type="number"><br><br>

<label>Dosage per tablet</label><br>
<input id="dosage_per_tablet" type="number"><br><br>

<label>Total Dosage</label><br>
<input id="total_dosage" readonly><br><br>

<label>Date</label><br>
<input id="medicine_date" type="date"><br><br>

<label>Time</label><br>
<input id="medicine_time" type="time"><br><br>

<button onclick="saveMedicine()">Save</button>
<button onclick="goBack()">Back</button>

<p id="msg"></p>

<script src="add_medicine.js"></script>
</body>
</html>
