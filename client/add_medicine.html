<!DOCTYPE html>
<html>
<head>
    <title>Add Medicine</title>
</head>

<body>

<h2>Add Medicine Intake</h2>

<label>Medicine Name</label><br>
<input type="text" id="medicine_name"><br><br>

<label>Quantity</label><br>
<input type="number" id="quantity_taken"><br><br>

<label>Dosage per tablet (mg)</label><br>
<input type="number" id="dosage_per_tablet"><br><br>

<label>Total Dosage</label><br>
<input type="number" id="total_dosage" readonly><br><br>

<label>Date</label><br>
<input type="date" id="medicine_date"><br><br>

<label>Time</label><br>
<input type="time" id="medicine_time"><br><br>

<button onclick="saveMedicine()">Save</button>
<button onclick="goBack()">Back</button>

<p id="msg"></p>

<script src="add_medicine.js"></script>

</body>
</html>
