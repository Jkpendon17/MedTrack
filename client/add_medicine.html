<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Medicine</title>
    <link rel="stylesheet" href="style/add_medicine.css">
</head>
<body>

    <header class="nav">
        <h2>MedTrack</h2>

        <div class="nav-buttons">
            <button type="button" onclick="goDashboard()">Dashboard</button>
            <button type="button" onclick="goHistory()">History</button>
            <button type="button" onclick="goProfile()">Profile</button>
            <button type="button" onclick="logout()">Logout</button>
        </div>
    </header>

    <main class="form-container">
        <h2>Add Medicine Intake</h2>

        <form id="medicineForm">
            <label for="medicine_name">Medicine Name</label>
            <input id="medicine_name" type="text" required>

            <label for="quantity_taken">Quantity</label>
            <input id="quantity_taken" type="number" required>

            <label for="dosage_per_tablet">Dosage per tablet</label>
            <input id="dosage_per_tablet" type="number" required>

            <label for="total_dosage">Total Dosage</label>
            <input id="total_dosage" type="number" readonly>

            <label for="medicine_date">Date</label>
            <input id="medicine_date" type="date" required>

            <label for="medicine_time">Time</label>
            <input id="medicine_time" type="time" required>

            <div class="form-buttons">
                <button type="button" class="primary-btn" onclick="saveMedicine()">Save</button>
                <button type="button" class="secondary-btn" onclick="goBack()">Back</button>
            </div>
        </form>

        <p id="msg"></p>
    </main>

    <script src="add_medicine.js"></script>
</body>
</html>
