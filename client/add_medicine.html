<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Medicine</title>
<link rel="stylesheet" href="style/add_medicine.css">
</head>

<body>

<header class="nav">
    <h2>MedTrack</h2>

    <div class="nav-buttons">
        <button onclick="goHistory()">History</button>
        <button onclick="goProfile()">Profile</button>
        <button onclick="logout()">Logout</button>
    </div>
</header>

<div class="container">

<h2>Add Medicine Intake</h2>

<label>Medicine Name</label>
<input type="text" id="medicine_name">

<label>Quantity</label>
<input type="number" id="quantity_taken">

<label>Dosage per tablet (mg)</label>
<input type="number" id="dosage_per_tablet">

<label>Total Dosage</label>
<input type="number" id="total_dosage" readonly>

<label>Date</label>
<input type="date" id="medicine_date">

<label>Time</label>
<input type="time" id="medicine_time">

<div class="buttons">
<button onclick="saveMedicine()">Save</button>
<button onclick="goBack()" id="Backbtn">Back</button>
</div>

<p id="msg"></p>

</div>

<script src="add_medicine.js"></script>

</body>
</html>
